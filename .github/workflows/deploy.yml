name: BestOffer CD (Java 21)

on:
  push:
    branches: [ "main" ] # main에 합칠 때만 배포

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6   # 내 코드를 가상 컴퓨터로 복사

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        # skips test since it's already done in CI
        run: mvn -B clean package -DskipTests --file pom.xml

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/bestoffer-app .
          docker push ${{ secrets.DOCKER_USERNAME }}/bestoffer-app

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Redis 컨테이너 실행 (스프링 부트보다 무조건 먼저 켜져야 함!)
            sudo docker stop redis-server || true
            sudo docker rm redis-server || true
            sudo docker run -d --restart always --name redis-server -p 6379:6379 redis:latest

            # 2. 최신 스프링 부트 이미지 Pull 및 기존 컨테이너 정리
            sudo docker system prune -f
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/bestoffer-app
            sudo docker stop bestoffer-server || true
            sudo docker rm bestoffer-server || true
            
            # 3. 스프링 부트 실행 (Redis 연결 정보 주입)
            sudo docker run -d --restart always --name bestoffer-server \
              -p 8080:8080 \
              --add-host host.docker.internal:host-gateway \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e REDIS_HOST=host.docker.internal \
              -e REDIS_PORT=6379 \
              -e RDS_HOSTNAME=${{ secrets.RDS_HOSTNAME }} \
              -e RDS_DB_NAME=${{ secrets.RDS_DB_NAME }} \
              -e RDS_USERNAME=${{ secrets.RDS_USERNAME }} \
              -e RDS_PASSWORD=${{ secrets.RDS_PASSWORD }} \
              ${{ secrets.DOCKER_USERNAME }}/bestoffer-app

      - name: Copy monitoring files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "monitoring/*" # 로컬(GitHub)의 monitoring 폴더 내부 파일들
          target: "~/monitoring" # EC2의 목적지
          strip_components: 1    # 폴더 껍데기는 벗기고 알맹이 파일만 쏙 넣음

      - name: Run Monitoring Containers
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/monitoring # 만약 폴더가 없다면 생성 (안전장치)
            cd ~/monitoring
            sudo docker-compose up -d