name: BestOffer CD (Java 21)

on:
  push:
    branches: [ "main" ] # main에 합칠 때만 배포

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6   # 내 코드를 가상 컴퓨터로 복사

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        # skips test since it's already done in CI
        run: mvn -B package -DskipTests --file pom.xml

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/bestoffer-app .
          docker push ${{ secrets.DOCKER_USERNAME }}/bestoffer-app

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/bestoffer-app
            sudo docker stop bestoffer-server || true
            sudo docker rm bestoffer-server || true
            
            # -e 옵션으로 RDS 정보를 컨테이너에 주입합니다.
            sudo docker run -d --restart always --name bestoffer-server \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e RDS_HOSTNAME=${{ secrets.RDS_HOSTNAME }} \
              -e RDS_DB_NAME=${{ secrets.RDS_DB_NAME }} \
              -e RDS_USERNAME=${{ secrets.RDS_USERNAME }} \
              -e RDS_PASSWORD=${{ secrets.RDS_PASSWORD }} \
              ${{ secrets.DOCKER_USERNAME }}/bestoffer-app

      - name: Run Monitoring Containers
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/monitoring # 만약 폴더가 없다면 생성 (안전장치)
            cd ~/monitoring
            docker-compose up -d