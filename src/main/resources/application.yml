spring:
  application:
    name: best-offer

  profiles:
    active: local # 기본적으로 로컬(H2) 환경으로 실행하도록 설정

  jpa:
    open-in-view: false # OSIV 경고 해결을 위해 공통으로 false 설정

management:
  endpoints:
    web:
      exposure:
        include: prometheus, metrics # 프로메테우스 전용 엔드포인트 오픈
  metrics:
    tags:
      application: BestOffer # 그라파나 대시보드에서 식별할 이름

  data:
    redis:
      # 운영 환경에서는 GitHub Actions Secrets나 EC2 환경변수에서 값을 주입받음
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}